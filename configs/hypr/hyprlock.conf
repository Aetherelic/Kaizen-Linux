# =========================================================
# Kaizen Linux hyprlock
# Minimal glass lock screen
# =========================================================

general {
    hide_cursor = true
    ignore_empty_input = true
    disable_loading_bar = true
}

background {
    monitor =
    path = ~/.config/hypr/current_wallpaper
    color = rgba(8, 10, 14, 1.0)

    blur_size = 8
    blur_passes = 3
    noise = 0.0100
    contrast = 1.0500
    brightness = 0.6200
    vibrancy = 0.1500
    vibrancy_darkness = 0.2500
}

# Time
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(244, 242, 255, 0.96)
    font_size = 88
    font_family = JetBrainsMono Nerd Font
    position = 0, 175
    halign = center
    valign = center

    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.45)
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(169, 164, 199, 0.92)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 95
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.35)
}

# Kaizen identity
label {
    monitor =
    text = KAIZEN LINUX
    color = rgba(157, 124, 255, 0.95)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -24
    halign = center
    valign = center

    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.38)
}

# Password field
input-field {
    monitor =
    size = 390, 52
    outline_thickness = 1

    dots_size = 0.20
    dots_spacing = 0.18
    dots_center = true
    fade_on_empty = false

    outer_color = rgba(157, 124, 255, 0.48)
    inner_color = rgba(8, 10, 14, 0.62)
    font_color = rgba(244, 242, 255, 0.95)

    placeholder_text = <i>Enter password</i>
    fail_text = <i>Access denied</i>

    rounding = 999

    check_color = rgba(103, 216, 255, 0.70)
    fail_color = rgba(255, 107, 138, 0.85)
    capslock_color = rgba(255, 210, 120, 0.90)

    position = 0, -105
    halign = center
    valign = center

    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.38)
}

# Hint
label {
    monitor =
    text = Press ESC to return
    color = rgba(169, 164, 199, 0.62)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -175
    halign = center
    valign = center
}
