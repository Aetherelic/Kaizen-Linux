---
dontChroot: false
timeout: 30
script:
  - "rm -f /etc/sddm.conf.d/10-kaizen-autologin.conf /etc/sudoers.d/kaizen-live"
  - "if id kaizen >/dev/null 2>&1; then other_user=$(awk -F: '$3 >= 1000 && $1 != "kaizen" && $1 != "nobody" {print $1; exit}' /etc/passwd); if [ -n "$other_user" ]; then loginctl terminate-user kaizen >/dev/null 2>&1 || true; userdel -r kaizen >/dev/null 2>&1 || true; fi; fi"
